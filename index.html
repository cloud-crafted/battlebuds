<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BattleBuds — Retro Arcade</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <header class="site-header">
      <h1 class="logo">BATTLEBUDS</h1>
      <p class="tag">A real-time persistent war — squad based tactics</p>
    </header>

    <main>
      <section class="hero">
        <div class="game-screen">
          <div class="hud">
            <span>Squad Alpha</span>
            <span>Score: 000420</span>
          </div>
          <div class="play-area">
            <div class="ship"></div>
            <div class="enemy"></div>
          </div>
        </div>
        <div class="cta">
          <a class="btn" href="#">Enter the War</a>
        </div>
      </section>

      <section class="about">
        <h2>About BattleBuds</h2>
        <p>BattleBuds is a persistent multiplayer war with tactical squad gameplay. This site is a retro arcade-style landing page celebrating the combat.</p>
      </section>
    </main>

    <footer class="site-footer">
      <small>© BattleBuds</small>
    </footer>
  </div>
</body>
</html>
