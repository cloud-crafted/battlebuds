<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BattleBuds — Classic Arcade</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="arcade-header">
    <h1>BattleBuds</h1>
    <p class="tag">A persistent real-time squad war — classic arcade style</p>
  </header>

  <main class="container">
    <section class="hero">
      <div class="screen">
        <div class="sprite player">&gt;=</div>
        <div class="sprite enemy">X</div>
      </div>
      <a class="cta" href="#play">Enter the War</a>
    </section>

    <section class="features">
      <h2>What is BattleBuds?</h2>
      <p>Squad-based tactics. Persistent frontline control. Real time action. Styled like a classic arcade shooter.</p>
    </section>
  </main>

  <footer class="arcade-footer">
    <small>© BattleBuds — May the best squad win</small>
  </footer>
</body>
</html>
