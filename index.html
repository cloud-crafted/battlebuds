<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BattleBuds - Classic Arcade</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="site-header">
    <h1>BattleBuds</h1>
    <p class="tag">Real-time persistent war. Squad tactics. Classic feel.</p>
  </header>

  <main class="hero">
    <div class="game-shell">
      <div class="hud">
        <div>Score: <span class="score">000000</span></div>
        <div>Wave: <span class="wave">01</span></div>
      </div>

      <div class="arena">
        <div class="player"></div>
        <div class="enemy e1"></div>
        <div class="enemy e2"></div>
      </div>

      <div class="call-to-action">
        <a class="btn" href="#">Join a Squad</a>
        <a class="btn ghost" href="#">How to Play</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <p>Built with pixels and passion.</p>
  </footer>
</body>
</html>
