<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BattleBuds — Classic Arcade</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen">
    <header class="title">
      <h1>BattleBuds</h1>
      <p class="tag">A persistent realtime war — squad based tactics</p>
    </header>

    <nav class="menu">
      <a href="#play" class="btn">Play</a>
      <a href="#about" class="btn">About</a>
      <a href="#squads" class="btn">Squads</a>
    </nav>

    <main class="hero">
      <div class="arcade-frame">
        <div class="viewport">
          <div class="ship"></div>
          <div class="enemy e1"></div>
          <div class="enemy e2"></div>
        </div>
      </div>
      <aside class="info">
        <div class="panel">
          <h2>Live Campaign</h2>
          <p>Join a squad and fight for territory in real time.</p>
        </div>
        <div class="panel stats">
          <div>Score <span>000120</span></div>
          <div>Squad <span>Red Dawn</span></div>
        </div>
      </aside>
    </main>

    <footer class="credits">Designed with ♥ — Classic arcade aesthetic</footer>
  </div>
</body>
</html>
