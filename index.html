<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>BattleBuds — Classic Arcade</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="screen">
    <header class="title">
      <h1>BattleBuds</h1>
      <p class="tag">Real-time persistent war — squad based tactics</p>
    </header>

    <main class="hero">
      <div class="pitch">
        <h2>Join the fight</h2>
        <p>Classic arcade feel. Fast, tactical, persistent.</p>
        <a class="cta" href="#play">Play Now</a>
      </div>
      <div class="visual">
        <div class="ship"></div>
        <div class="enemy"></div>
      </div>
    </main>

    <section class="features">
      <article>
        <h3>Squad Tactics</h3>
        <p>Work together in persistent battles to control the map.</p>
      </article>
      <article>
        <h3>Real-time Action</h3>
        <p>Arcade shooting with modern persistence.</p>
      </article>
    </section>

    <footer>
      <small>Design prototype for BAT-6</small>
    </footer>
  </div>
</body>
</html>
