<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>BattleBuds - Classic</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="wrapper">
    <header>
      <h1>BattleBuds</h1>
      <p class="tag">A persistent, real-time squad-based war</p>
    </header>

    <main>
      <section class="hero">
        <div class="screen">
          <div class="ship"></div>
          <div class="enemy"></div>
        </div>
        <div class="cta">
          <a class="btn" href="#play">Play Now</a>
        </div>
      </section>

      <section class="about">
        <h2>About BattleBuds</h2>
        <p>Classic arcade look and feel with modern persistent multiplayer mechanics. Join a squad, fight for territory, and upgrade your arsenal.</p>
      </section>
    </main>

    <footer>
      <p>© BattleBuds</p>
    </footer>
  </div>
</body>
</html>
